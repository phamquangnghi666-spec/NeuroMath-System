<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Toán</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#5b21b6,#9333ea);
  color:white;
  text-align:center;
}

/* INTRO */
.intro{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#4c1d95,#9333ea,#c084fc);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  animation:fadeIn 1.2s ease;
}

.intro h1{
  font-size:42px;
  margin-bottom:15px;
  opacity:0;
  animation:slideDown 1s ease forwards;
}

.intro p{
  opacity:0;
  animation:fadeText 2s ease forwards;
  animation-delay:0.5s;
}

.start-btn{
  padding:14px 35px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:white;
  color:#6d28d9;
  cursor:pointer;
  transition:0.3s;
  margin-top:20px;
  opacity:0;
  animation:fadeText 2s ease forwards;
  animation-delay:1s;
}

.start-btn:hover{
  background:#ede9fe;
  transform:scale(1.05);
}

/* QUIZ */
.quiz{
  display:none;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
  font-size:18px;
}

.question{
  font-size:22px;
  margin-bottom:20px;
}

.answer-btn{
  display:block;
  width:80%;
  margin:10px auto;
  padding:12px;
  background:white;
  color:#6d28d9;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.answer-btn:hover{
  background:#ddd6fe;
}

.correct{
  background:#22c55e !important;
  color:white;
}

.wrong{
  background:#ef4444 !important;
  color:white;
}

.explain{
  margin-top:15px;
  font-size:16px;
}
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes slideDown{
  from{opacity:0; transform:translateY(-40px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes fadeText{
  from{opacity:0;}
  to{opacity:1;}
}
.ai-box{
  margin-top:20px;
  padding:20px;
  background:rgba(255,255,255,0.15);
  border-radius:15px;
  backdrop-filter:blur(10px);
  animation:fadeIn 0.5s ease;
  text-align:left;
}
</style>
</head>
<body>

<div class="intro" id="intro">
  <h1>🎓 QUIZ TOÁN </h1>
  <p>Kiểm tra kiến thức của bạn trong 120 giây</p>
  <p>Hệ thống sẽ phân tích điểm mạnh – điểm yếu sau khi hoàn thành</p>
  <button class="start-btn" onclick="startQuiz()">BẮT ĐẦU</button>
</div>
<!-- QUIZ -->
<div class="topbar">
  <div>Điểm: <span id="score">0</span>/10</div>
  <div>⏳ <span id="time">60</span>s</div>
  <button onclick="goIndex()">🏠</button>
</div>
  <div id="questionArea"></div>
  <div id="explainBox" class="explain"></div>
</div>

<script>
let score=0;
let current=0;
let time=120;
let timer=null;

const questions = [

{
q:"Câu 1: Cho hàm số f(x) = 1/x - 3 có tiệm cận đứng là:",
options:[
"A. (-∞; -1/3]",
"B. (-∞; 3]",
"C. (3; +∞)",
"D. x = 0"
],
answer:3,
topic:"Hàm số",
explain:"Tiệm cận đứng khi mẫu bằng 0 → x = 0."
},

{
q:"Câu 2: Trong Oxyz, mặt phẳng x + 2y - 3z + 3 = 0 có vectơ pháp tuyến là:",
options:[
"A. (1;2;-3)",
"B. (1;-2;3)",
"C. (-1;2;-3)",
"D. (1;2;3)"
],
answer:0,
topic:"Oxyz",
explain:"Vectơ pháp tuyến của mặt phẳng Ax+By+Cz+D=0 là (A,B,C)."
},

{
q:"Câu 3: Góc giữa SC và đáy là:",
options:[
"A. ∠SCB",
"B. ∠SAC",
"C. ∠SBC",
"D. ∠SCA"
],
answer:3,
topic:"Hình học không gian",
explain:"Góc giữa đường thẳng và mặt phẳng là góc giữa đường thẳng và hình chiếu của nó xuống mặt phẳng → ∠SCA."
},

{
q:"Câu 4: log4(x-1) = 3. Nghiệm là:",
options:[
"A. x = 66",
"B. x = 68",
"C. x = 65",
"D. x = 63"
],
answer:2,
topic:"Logarit",
explain:"4³ = 64 → x - 1 = 64 → x = 65."
},

{
q:"Câu 5: u1 = -2, q = 3. u2 bằng:",
options:[
"A. 1",
"B. -6",
"C. 6",
"D. -18"
],
answer:1,
topic:"Cấp số nhân",
explain:"u2 = u1 × q = -2 × 3 = -6."
},
{
q:"Câu 6: a = i + 2j - 3k. Tọa độ của vectơ là:",
options:[
"A. (2;-3;-1)",
"B. (-1;2;-3)",
"C. (1;2;-3)",
"D. (-3;2;-1)"
],
answer:2,
topic:"Vectơ",
explain:"Hệ số của i, j, k lần lượt là (1,2,-3)."
},
{
q:"Câu 7: Hàm số nghịch biến trên khoảng:",
options:[
"A. (-∞;1]",
"B. (-1;3]",
"C. (1;+∞)",
"D. (1;3)"
],
answer:3,
topic:"Đạo hàm",
explain:"Hàm nghịch biến khi f'(x) < 0 → khoảng (1;3)."
},
{
q:"Câu 8: Hàm số đồng biến trên khoảng:",
options:[
"A. (-∞;-1)",
"B. (-1;1)",
"C. (1;+∞)",
"D. (1;+∞)"
],
answer:1,
topic:"Đạo hàm",
explain:"Dựa vào đồ thị → hàm tăng trên (-1;1)."
},
{
q:"Câu 9: Diện tích giới hạn bởi y = x² + 1 từ 1 đến 2 là:",
options:[
"A. 7/3",
"B. 10/3",
"C. 7",
"D. 8"
],
answer:1,
topic:"Tích phân",
explain:"∫(x²+1)dx từ 1→2 = 10/3."
},
{
q:"Câu 10: Tập nghiệm của log2(x) ≤ 3 là:",
options:[
"A. (0;8)",
"B. [0;8)",
"C. [0;8]",
"D. (0;8]"
],
answer:3,
topic:"Logarit",
explain:"log₂x ≤ 3 → x ≤ 8 và x > 0 → (0;8]."
}
];

function startQuiz(){
  document.getElementById("intro").style.opacity="0";
  
  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("quizBox").style.display="block";
  },500);

  timer=setInterval(()=>{
    time--;
    document.getElementById("time").innerText=time;
    if(time<=0){
      finishQuiz();
    }
  },1000);

  loadQuestion();
}

function loadQuestion(){
  if(current>=questions.length){
    finishQuiz();
    return;
  }

  let q=questions[current];
  document.getElementById("questionArea").innerHTML=
  `<div class="question">${q.q}</div>`+
  q.options.map((opt,i)=>
  `<button class="answer-btn" onclick="checkAnswer(${i})">${opt}</button>`
  ).join("");

  document.getElementById("explainBox").innerHTML="";
}

function checkAnswer(index){
  let q=questions[current];

  if(!topicStats[q.topic]){
    topicStats[q.topic] = {correct:0,total:0};
  }

  topicStats[q.topic].total++;

  let buttons=document.querySelectorAll(".answer-btn");
  buttons.forEach(b=>b.disabled=true);

  if(index===q.answer){
    buttons[index].classList.add("correct");
    score++;
    topicStats[q.topic].correct++; // <-- cộng đúng ở đây
  }else{
    buttons[index].classList.add("wrong");
    buttons[q.answer].classList.add("correct");
  }

  if(score>10) score=10;

  document.getElementById("score").innerText=score;
  document.getElementById("explainBox").innerHTML=q.explain;

  setTimeout(()=>{
    current++;
    loadQuestion();
  },1500);
}

function finishQuiz(){
  clearInterval(timer);

  document.getElementById("explainBox").innerHTML = ""; // ← thêm dòng này

  let analysis = analyzePerformance();

  document.getElementById("questionArea").innerHTML=
  `<h2>🎯 KẾT THÚC</h2>
   <p>Điểm của bạn: ${score}/10</p>

   <button class="start-btn" onclick="toggleAI()">🤖 Xem AI Phân Tích</button>

   <div id="aiBox" class="ai-box" style="display:none;">
      ${analysis}
   </div>

   <br>
   <button class="start-btn" onclick="goIndex()">🏠 Về Trang Chính</button>`;
}
let topicStats = {};
function analyzePerformance(){

  let strong = [];
  let weak = [];

  for(let topic in topicStats){
    let data = topicStats[topic];
    let percent = data.correct / data.total;

    if(percent >= 0.7){
      strong.push(topic);
    }else{
      weak.push(topic);
    }
  }

  let result = "<h3>🤖 AI Phân tích</h3>";

  if(score >= 8){
    result += "<p>🔥 Bạn có nền tảng rất tốt!</p>";
  }else if(score >=5){
    result += "<p>👍 Bạn có kiến thức cơ bản khá ổn.</p>";
  }else{
    result += "<p>📚 Bạn cần ôn tập lại nhiều phần kiến thức.</p>";
  }

  if(strong.length>0){
    result += "<p><b>💪 Điểm mạnh:</b> " + strong.join(", ") + "</p>";
  }

  if(weak.length>0){
    result += "<p><b>⚠ Điểm yếu:</b> " + weak.join(", ") + "</p>";
    result += "<p><b>📌 Gợi ý ôn tập:</b></p>";
    
    weak.forEach(t=>{
      result += generateSuggestion(t);
    });
  }

  return result;
}
function generateSuggestion(topic){

  switch(topic){

    case "Hàm số":
      return "<p>• Ôn lại tiệm cận, khảo sát hàm số, bảng biến thiên.</p>";

    case "Đạo hàm":
      return "<p>• Luyện bảng xét dấu f'(x), khoảng đồng biến – nghịch biến.</p>";

    case "Logarit":
      return "<p>• Ôn điều kiện xác định và các công thức log cơ bản.</p>";

    case "Tích phân":
      return "<p>• Luyện công thức nguyên hàm và bài tính diện tích.</p>";

   case "Cấp số nhân":
  return "<p>• Ôn công thức số hạng tổng quát và công bội.</p>";
    case "Vectơ":
      return "<p>• Ôn tọa độ vectơ và phép cộng trừ vectơ.</p>";

    case "Oxyz":
      return "<p>• Ôn phương trình mặt phẳng và vectơ pháp tuyến.</p>";

    default:
      return "<p>• Luyện thêm bài tập chuyên đề này.</p>";
  }
}
function goIndex(){
  window.location.href = "index.html";
}
function toggleAI(){
  let box = document.getElementById("aiBox");
  
  if(box.style.display === "none"){
    box.style.display = "block";
  }else{
    box.style.display = "none";
  }
}
</script>

</body>
</html>
